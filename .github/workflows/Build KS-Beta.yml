on:
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-22.04
            platform: linux
          - os: macos-15-intel
            platform: macos

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Sync upstream KyroSpades
        run: |
          cp -r src /tmp/ks-backup-src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Kyrope01/KyroSpades.git || true
          git fetch upstream
          if ! git merge upstream/main --no-edit; then
            echo "::warning::Upstream merge failed (diverged history / conflicts) — building WITHOUT latest upstream changes."
            git merge --abort || true
          fi
          rm -rf src && mv /tmp/ks-backup-src src
        shell: bash

      - name: Cache CMake dependencies
        if: matrix.platform != 'windows'
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('src/CMakeLists.txt') }}

      # --- WINDOWS ONLY BUILD STEPS ---
      - name: Install MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-openal
            mingw-w64-ucrt-x86_64-enet
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python
            zip
            make

      - name: Apply Windows fixes (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          sed -i '1s/^/#include <stdint.h>\n/' src/network.h || true
          sed -i '1s/^/#include <sys\/stat.h>\n/' src/texture.c || true
          sed -i 's/mkdir(dir_path, 0755)/mkdir(dir_path)/' src/demo.c || true
          sed -i '1s/^/#include <sys\/stat.h>\n/' src/skins.c || true
          sed -i 's/if(entry->d_type == DT_REG || entry->d_type == DT_UNKNOWN) {/struct stat st; char _stat_path[512]; snprintf(_stat_path, sizeof(_stat_path), "kv6\/%s", entry->d_name); stat(_stat_path, \&st); if(S_ISREG(st.st_mode)) {/g' src/skins.c || true

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
          make -j$(nproc)

      - name: Bundle DLLs (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd build/KyroSpades
          ldd client.exe | grep ucrt64 | awk '{print $3}' | xargs -I{} cp {} .

      - name: Zip release (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd build
          zip -r "KS-Beta Windows.zip" KyroSpades/

      # --- LINUX ONLY BUILD STEPS ---
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libglfw3-dev libglew-dev libopenal-dev libenet-dev libdeflate-dev libpulse-dev zip libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev patchelf

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Bundle shared libraries (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build/KyroSpades
          set -e
          for lib in $(ldd client | grep '=> /' | awk '{print $3}'); do
            case "$lib" in
              */ld-linux*|*/libc.so.*|*/libm.so.*|*/libpthread.so.*|*/libdl.so.*|*/librt.so.*|*/libresolv.so.*|*/libutil.so.*|*/libnss_*|*/libstdc++.so.*|*/libgcc_s.so.*|*linux-vdso*)
                ;;
              *)
                echo "Bundling: $lib"
                cp -n "$lib" .
                ;;
            esac
          done
          patchelf --set-rpath '$ORIGIN' client

      - name: Zip release (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build
          zip -r "KS-Beta Linux.zip" KyroSpades/

      # --- MACOS ONLY BUILD STEPS (x86_64, targets macOS 11.0+) ---
      - name: Cache source-built macOS deps
        if: matrix.platform == 'macos'
        uses: actions/cache@v4
        with:
          path: deps-prefix
          key: macos-x86_64-target11-glew2.2.0-enet1.3.18-libdeflate1.19

      - name: Install build tools (macOS)
        if: matrix.platform == 'macos'
        run: brew install cmake pkg-config ffmpeg dylibbundler

      - name: Build dependencies from source (macOS)
        if: matrix.platform == 'macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          set -euo pipefail
          DEPS="$GITHUB_WORKSPACE/deps-prefix"
          mkdir -p "$DEPS/lib" "$DEPS/include"
          COMMON="-DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                  -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                  -DCMAKE_INSTALL_PREFIX=$DEPS \
                  -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

          # GLEW (static)
          if [ ! -f "$DEPS/lib/libGLEW.a" ]; then
            curl -L -o glew.tgz https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0.tgz
            tar xzf glew.tgz
            cmake -S glew-2.2.0/build/cmake -B glew-build $COMMON -DBUILD_SHARED_LIBS=OFF -DBUILD_UTILS=OFF
            cmake --build glew-build
            cmake --install glew-build
          fi

          # enet (static)
          if [ ! -f "$DEPS/lib/libenet.a" ]; then
            curl -L -o enet.tar.gz https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz
            tar xzf enet.tar.gz
            cmake -S enet-1.3.18 -B enet-build $COMMON
            cmake --build enet-build
            cp enet-build/libenet.a "$DEPS/lib/"
            cp -r enet-1.3.18/include/enet "$DEPS/include/"
          fi

          # libdeflate (static)
          if [ ! -f "$DEPS/lib/libdeflate.a" ]; then
            curl -L -o libdeflate.tar.gz https://github.com/ebiggers/libdeflate/archive/refs/tags/v1.19.tar.gz
            tar xzf libdeflate.tar.gz
            cmake -S libdeflate-1.19 -B libdeflate-build $COMMON \
                  -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
                  -DLIBDEFLATE_BUILD_STATIC_LIB=ON \
                  -DLIBDEFLATE_BUILD_GZIP=OFF
            cmake --build libdeflate-build
            cmake --install libdeflate-build
          fi

      - name: Apply macOS fixes
        if: matrix.platform == 'macos'
        run: |
          # Fix abs() on float values in camera.c
          sed -i '' 's/int xr = abs(errx)/int xr = (int)fabsf(errx)/' src/camera.c
          sed -i '' 's/int yr = abs(erry)/int yr = (int)fabsf(erry)/' src/camera.c
          sed -i '' 's/int zr = abs(errz)/int zr = (int)fabsf(errz)/' src/camera.c

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          set -euo pipefail
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/deps-prefix" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..
          make -j$(sysctl -n hw.logicalcpu)

      - name: Bundle shared libraries (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd build/KyroSpades
          dylibbundler -b -x client -d . -p @loader_path/

      - name: Verify macOS binary arch + min OS (macOS)
        if: matrix.platform == 'macos'
        run: |
          BIN=build/KyroSpades/client
          file "$BIN"
          lipo -archs "$BIN" || true
          otool -l "$BIN" | grep -A4 -E 'LC_VERSION_MIN_MACOSX|LC_BUILD_VERSION' || true

      - name: Zip release (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd build
          zip -r "KS-Beta MacOS.zip" KyroSpades/

      # --- UPLOAD ARTIFACTS ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: build/*.zip

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Sync upstream KyroSpades
        run: |
          cp -r src /tmp/ks-backup-src
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Kyrope01/KyroSpades.git || true
          git fetch upstream
          if ! git merge upstream/main --no-edit; then
            echo "::warning::Upstream merge failed (diverged history / conflicts) — building WITHOUT latest upstream changes."
            git merge --abort || true
          fi
          rm -rf src && mv /tmp/ks-backup-src src
        shell: bash

      - name: Ensure Android asset script exists
        run: |
          if [[ ! -f package_android_assets.sh ]]; then
            echo "package_android_assets.sh missing after upstream merge — creating inline"
            cat > package_android_assets.sh << 'ASSETS_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          KS_DIR="${1:-$SCRIPT_DIR}"
          ASSETS="$KS_DIR/android/app/src/main/assets"
          [[ -d "$KS_DIR/resources" ]] || { echo "::error::resources/ directory not found"; exit 1; }
          if [[ ! -f "$KS_DIR/bsresources.zip" ]]; then
            echo "bsresources.zip not found — downloading ..."
            curl -L --fail -o "$KS_DIR/bsresources.zip" http://aos.party/bsresources.zip
          fi
          rm -rf "$ASSETS"
          mkdir -p "$ASSETS"
          echo "[1/3] Copying resources/ ..."
          cp -R "$KS_DIR/resources/." "$ASSETS/"
          rm -f "$ASSETS/icon.rc"
          echo "[2/3] Extracting bsresources.zip ..."
          unzip -o -q "$KS_DIR/bsresources.zip" -d "$ASSETS"
          find "$ASSETS" -name '.gitignore' -delete
          if [[ -d "$KS_DIR/resources.override" ]]; then
            echo "[3/3] Applying resources.override/ ..."
            cp -R "$KS_DIR/resources.override/." "$ASSETS/"
          else
            echo "[3/3] No resources.override/ — skipping"
          fi
          echo "Done. config.ini: $( [[ -f "$ASSETS/config.ini" ]] && echo present || echo MISSING )"
          ASSETS_EOF
            chmod +x package_android_assets.sh
          fi
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK + CMake
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Cache Android native deps
        uses: actions/cache@v4
        with:
          path: build-android/deps-install
          key: android-arm64-api21-enet1.3.18-libdeflate1.20-openal1.23.1

      - name: Build native deps (enet + libdeflate)
        run: |
          set -euo pipefail
          NDK="$ANDROID_HOME/ndk/27.2.12479018"
          DEPS="$GITHUB_WORKSPACE/build-android/deps-install"
          mkdir -p "$DEPS/lib" "$DEPS/include"
          COMMON="-DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
                  -DANDROID_ABI=arm64-v8a \
                  -DANDROID_PLATFORM=android-21 \
                  -DANDROID_STL=c++_static \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_INSTALL_PREFIX=$DEPS \
                  -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

          # enet (static)
          if [ ! -f "$DEPS/lib/libenet.a" ]; then
            curl -L -o enet.tar.gz https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz
            tar xzf enet.tar.gz
            cmake -S enet-1.3.18 -B enet-build $COMMON
            cmake --build enet-build --parallel
            find enet-build -name 'libenet.a' -exec cp {} "$DEPS/lib/" \;
            cp -r enet-1.3.18/include/enet "$DEPS/include/"
          fi

          # libdeflate (static)
          if [ ! -f "$DEPS/lib/libdeflate.a" ]; then
            curl -L -o libdeflate.tar.gz https://github.com/ebiggers/libdeflate/archive/refs/tags/v1.20.tar.gz
            tar xzf libdeflate.tar.gz
            cmake -S libdeflate-1.20 -B libdeflate-build $COMMON \
                  -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
                  -DLIBDEFLATE_BUILD_STATIC_LIB=ON \
                  -DLIBDEFLATE_BUILD_GZIP=OFF \
                  -DLIBDEFLATE_BUILD_TESTS=OFF
            cmake --build libdeflate-build --parallel
            cmake --install libdeflate-build
          fi

          # openal-soft (static, OpenSL ES backend) — sound support
          if [ ! -f "$DEPS/lib/libopenal.a" ]; then
            curl -L -o openal.tar.gz https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz
            tar xzf openal.tar.gz
            cmake -S openal-soft-1.23.1 -B openal-build $COMMON \
                  -DLIBTYPE=STATIC \
                  -DALSOFT_EXAMPLES=OFF \
                  -DALSOFT_TESTS=OFF \
                  -DALSOFT_UTILS=OFF \
                  -DALSOFT_BACKEND_OPENSL=ON \
                  -DALSOFT_BACKEND_OBOE=OFF
            cmake --build openal-build --parallel
            cmake --install openal-build
          fi

      - name: Package game assets into the APK project
        run: |
          chmod +x package_android_assets.sh
          ./package_android_assets.sh

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Restore release keystore (optional)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KS_RELEASE_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore restored from secrets."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret set."
            echo "The release APK will be signed with the debug key (still installable on phones)."
          fi

      - name: Build APK (assembleRelease)
        env:
          KS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KS_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p build
          cp android/app/build/outputs/apk/release/*.apk "build/KS-Beta Android.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/*.apk


  release:
    name: Create GitHub Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true
          path: release-artifacts

      - name: Get date for release tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: KS-Beta
          name: KyroSpades Beta
          files: |
            release-artifacts/KS-Beta Windows.zip
            release-artifacts/KS-Beta Linux.zip
            release-artifacts/KS-Beta MacOS.zip
            release-artifacts/KS-Beta Android.apk
          body: Latest version of KyroSpades Beta compiled for Windows, Linux, and macOS.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
