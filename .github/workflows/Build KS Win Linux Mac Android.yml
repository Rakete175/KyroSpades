on:
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-15-intel
            platform: macos

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Sync upstream KyroSpades
        run: |
          cp -r src /tmp/ks-backup-src
          cp -r cmake /tmp/ks-backup-cmake
          cp -r .github /tmp/ks-backup-github
          cp -r deps /tmp/ks-backup-deps
          cp CMakeLists.txt /tmp/ks-backup-cmakelists 2>/dev/null || true
          cp README.md /tmp/ks-backup-readme 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Kyrope01/KyroSpades.git || true
          git fetch upstream
          if ! git merge upstream/main --no-edit; then
            echo "::warning::Upstream merge failed (diverged history / conflicts) — building WITHOUT latest upstream changes."
            git merge --abort || true
          fi
          rm -rf src && mv /tmp/ks-backup-src src
          rm -rf cmake && mv /tmp/ks-backup-cmake cmake
          rm -rf .github && mv /tmp/ks-backup-github .github
          rm -rf deps && mv /tmp/ks-backup-deps deps
          mv /tmp/ks-backup-cmakelists CMakeLists.txt 2>/dev/null || true
          mv /tmp/ks-backup-readme README.md 2>/dev/null || true
        shell: bash

      - name: Cache CMake dependencies
        if: matrix.platform != 'windows'
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('src/CMakeLists.txt') }}

      # --- WINDOWS ONLY BUILD STEPS ---
      - name: Install MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-glfw
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-openal
            mingw-w64-ucrt-x86_64-enet
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-python
            zip
            make

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
          make -j$(nproc)

      - name: Bundle DLLs (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd build/KyroSpades
          ldd client.exe | grep ucrt64 | awk '{print $3}' | xargs -I{} cp {} .

      - name: Zip release (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd build
          zip -9r KyroSpades-win64.zip KyroSpades/

      # --- LINUX ONLY BUILD STEPS ---
      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libglfw3-dev libglew-dev libopenal-dev libenet-dev libdeflate-dev libpulse-dev zip libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev patchelf

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)

      - name: Bundle shared libraries (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build/KyroSpades
          mkdir -p lib
          set -e
          for lib in avcodec avformat avutil swresample swscale; do
            path=$(ldd client | awk -v l="lib$lib" '$1 ~ l {print $3}')
            [ -n "$path" ] && cp -n "$path" lib/
          done
          changed=1
          while [ "$changed" = "1" ]; do
            changed=0
            for f in lib/*.so*; do
              [ ! -f "$f" ] && continue
              for dep in $(ldd "$f" 2>/dev/null | grep '=> /' | awk '{print $3}'); do
                case "$dep" in
                  */ld-linux*|*/libc.so.*|*/libm.so.*|*/libpthread.so.*|*/libdl.so.*|*/librt.so.*|*/libstdc++.so.*|*/libgcc_s.so.*|*/libresolv*|*/libnss_*|*/libutil*|*/libz.so.*|*/libexpat*)
                    ;;
                  *)
                    base=$(basename "$dep")
                    [ ! -f "lib/$base" ] && { cp -n "$dep" lib/; changed=1; }
                    ;;
                esac
              done
            done
          done
          patchelf --set-rpath '$ORIGIN/lib' client
          for f in lib/*.so*; do
            [ -f "$f" ] && patchelf --set-rpath '$ORIGIN' "$f" 2>/dev/null || true
          done

      - name: Zip release (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd build
          zip -9r "KyroSpades Linux.zip" KyroSpades/

      # --- MACOS ONLY BUILD STEPS (x86_64, targets macOS 11.0+) ---
      - name: Cache source-built macOS deps
        if: matrix.platform == 'macos'
        uses: actions/cache@v4
        with:
          path: deps-prefix
          key: macos-x86_64-target11-glew2.2.0-sdl2.30.10-enet1.3.18-libdeflate1.19

      - name: Install build tools (macOS)
        if: matrix.platform == 'macos'
        run: brew install cmake pkg-config ffmpeg

      - name: Build dependencies from source (macOS)
        if: matrix.platform == 'macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          set -euo pipefail
          DEPS="$GITHUB_WORKSPACE/deps-prefix"
          mkdir -p "$DEPS/lib" "$DEPS/include"
          COMMON="-DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                  -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                  -DCMAKE_INSTALL_PREFIX=$DEPS \
                  -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

          # GLEW (static)
          if [ ! -f "$DEPS/lib/libGLEW.a" ]; then
            curl -L -o glew.tgz https://github.com/nigels-com/glew/releases/download/glew-2.2.0/glew-2.2.0.tgz
            tar xzf glew.tgz
            cmake -S glew-2.2.0/build/cmake -B glew-build $COMMON -DBUILD_SHARED_LIBS=OFF -DBUILD_UTILS=OFF
            cmake --build glew-build
            cmake --install glew-build
          fi

          # SDL2 (static) — pinned to match the iOS/desktop builds. Built from
          # source so the binary does NOT depend on a Homebrew-installed
          # libSDL2*.dylib at an absolute path. Homebrew's ffmpeg pulls in
          # sdl2-compat, and without this find_package(SDL2) links against that
          # shim, baking /usr/local/opt/sdl2-compat/... into the binary — which
          # then fails on any machine that doesn't have that exact formula.
          if [ ! -f "$DEPS/lib/libSDL2.a" ]; then
            curl -L -o sdl2.tar.gz https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.30.10.tar.gz
            tar xzf sdl2.tar.gz
            cmake -S SDL-release-2.30.10 -B sdl2-build $COMMON \
                  -DSDL_SHARED=OFF -DSDL_STATIC=ON -DSDL_TEST=OFF
            cmake --build sdl2-build
            cmake --install sdl2-build
          fi

          # enet (static)
          if [ ! -f "$DEPS/lib/libenet.a" ]; then
            curl -L -o enet.tar.gz https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz
            tar xzf enet.tar.gz
            cmake -S enet-1.3.18 -B enet-build $COMMON
            cmake --build enet-build
            cp enet-build/libenet.a "$DEPS/lib/"
            cp -r enet-1.3.18/include/enet "$DEPS/include/"
          fi

          # libdeflate (static)
          if [ ! -f "$DEPS/lib/libdeflate.a" ]; then
            curl -L -o libdeflate.tar.gz https://github.com/ebiggers/libdeflate/archive/refs/tags/v1.19.tar.gz
            tar xzf libdeflate.tar.gz
            cmake -S libdeflate-1.19 -B libdeflate-build $COMMON \
                  -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
                  -DLIBDEFLATE_BUILD_STATIC_LIB=ON \
                  -DLIBDEFLATE_BUILD_GZIP=OFF
            cmake --build libdeflate-build
            cmake --install libdeflate-build
          fi

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          set -euo pipefail
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/deps-prefix" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                ..
          make -j$(sysctl -n hw.logicalcpu)

      - name: Bundle shared libraries (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd build/KyroSpades
          mkdir -p lib
          set -e
          # Seed with ffmpeg (video recording) AND SDL2. Fix 1 links SDL2
          # statically so nothing should be found here, but if a dynamic SDL2
          # ever sneaks back in (e.g. pulled transitively by another lib) this
          # copies it into lib/ instead of leaving an absolute Homebrew path
          # baked into the binary — the exact failure this guards against:
          #   Library not loaded: /usr/local/opt/sdl2-compat/lib/libSDL2-2.0.0.dylib
          for lib in avcodec avformat avutil swresample swscale SDL2; do
            path=$(otool -L client | awk -v l="lib$lib" '$1 ~ l {print $1}')
            [ -n "$path" ] && [ -f "$path" ] && cp -n "$path" lib/
          done
          changed=1
          while [ "$changed" = "1" ]; do
            changed=0
            for f in lib/*.dylib; do
              [ ! -f "$f" ] && continue
              for dep in $(otool -L "$f" 2>/dev/null | tail -n +2 | awk '{print $1}'); do
                case "$dep" in
                  /usr/lib/*|/System/*|@loader_path/*|@rpath/*) ;;
                  *)
                    base=$(basename "$dep")
                    [ ! -f "lib/$base" ] && [ -f "$dep" ] && { cp -n "$dep" lib/; changed=1; }
                    ;;
                esac
              done
            done
          done
          for f in lib/*.dylib; do
            name=$(basename "$f")
            # A dylib's own ID and its references to SIBLING dylibs must NOT
            # include the lib/ prefix: for a dylib living in lib/, @loader_path
            # already IS lib/, so @loader_path/lib/foo.dylib wrongly resolves to
            # lib/lib/foo.dylib. Siblings are @loader_path/foo.dylib. (client, in
            # the root dir, is the one that correctly uses @loader_path/lib/ —
            # see the separate client loop below.)
            install_name_tool -id "@loader_path/$name" "$f" 2>/dev/null || true
            for dep in $(otool -L "$f" 2>/dev/null | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                /usr/lib/*|/System/*|@loader_path/*|@rpath/*) ;;
                *)
                  dylib=$(basename "$dep")
                  [ -f "lib/$dylib" ] && install_name_tool -change "$dep" "@loader_path/$dylib" "$f"
                  ;;
              esac
            done
          done

          # Finally, repoint client's OWN load commands at the bundled copies.
          # The loop above only fixed references between the dylibs in lib/; the
          # executable itself was still loading them (and SDL2) from absolute
          # build-machine paths, so relocation was only half-done before.
          for dep in $(otool -L client | tail -n +2 | awk '{print $1}'); do
            case "$dep" in
              /usr/lib/*|/System/*|@loader_path/*|@rpath/*) ;;
              *)
                dylib=$(basename "$dep")
                [ -f "lib/$dylib" ] && install_name_tool -change "$dep" "@loader_path/lib/$dylib" client
                ;;
            esac
          done
          # Fail loudly if anything non-system is STILL referenced by an
          # absolute path — better a red CI run than a broken download.
          leftover=$(otool -L client | tail -n +2 | awk '{print $1}' \
                     | grep -Ev '^(/usr/lib/|/System/|@loader_path/|@rpath/)' || true)
          if [ -n "$leftover" ]; then
            echo "::error::client still references unbundled absolute dylib paths:"
            echo "$leftover"
            exit 1
          fi

          # Stronger check: actually RESOLVE every @loader_path reference (in the
          # dylibs AND in client) and confirm the target file exists. This catches
          # the doubled-prefix bug (@loader_path/lib/foo inside a lib/ dylib →
          # lib/lib/foo) that an absolute-path grep cannot see. For a dylib in
          # lib/, @loader_path is lib/; for client in ., @loader_path is . .
          bad=0
          check_refs() { # $1 = mach-o file, $2 = its @loader_path dir
            otool -L "$1" | tail -n +2 | awk '{print $1}' | while read -r ref; do
              case "$ref" in
                @loader_path/*)
                  resolved="$2/${ref#@loader_path/}"
                  if [ ! -f "$resolved" ]; then
                    echo "::error::$1 references $ref → missing $resolved"
                    echo "BAD"
                  fi
                  ;;
              esac
            done
          }
          # `while` runs in a subshell, so smuggle failures out via a marker file.
          : > /tmp/ks_ref_fail
          { for f in lib/*.dylib; do check_refs "$f" "lib"; done; check_refs client "."; } \
            | grep -q BAD && echo fail > /tmp/ks_ref_fail || true
          if [ -s /tmp/ks_ref_fail ]; then
            echo "::error::One or more @loader_path references do not resolve (see above)."
            exit 1
          fi

          # install_name_tool rewrites INVALIDATE each Mach-O's code signature,
          # and modern macOS (esp. Apple Silicon) refuses to load a dylib whose
          # signature no longer matches its bytes — the failure looks like:
          #   code signature not valid for use in process:
          #   library load disallowed by system policy
          # Re-sign ad-hoc (-s -) so the signatures match again. This is enough
          # for local/sideloaded distribution; it is NOT notarization, so first
          # launch may still need right-click > Open, or:
          #   xattr -dr com.apple.quarantine "KyroSpades"
          # Sign dylibs first, then the executable that loads them, last.
          for f in lib/*.dylib; do
            [ -f "$f" ] && codesign --force --sign - --timestamp=none "$f"
          done
          codesign --force --sign - --timestamp=none client
          codesign --verify --verbose client || true

          # Build a proper .app bundle so Gatekeeper assesses ONCE, not per-dylib.
          cd ..
          APP="KyroSpades.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Frameworks" "$APP/Resources"
          cp KyroSpades/client "$APP/MacOS/KyroSpades"
          cp KyroSpades/lib/*.dylib "$APP/Frameworks/" 2>/dev/null || true
          # kv6/ png/ wav/ come from bsresources.zip extraction in the build dir.
          # fonts/ and resources/ live in the source tree, not the build dir.
          for d in kv6 png wav; do
            [ -d "KyroSpades/$d" ] && cp -r "KyroSpades/$d" "$APP/Resources/$d"
          done
          [ -d "fonts" ] && cp -r "fonts" "$APP/Resources/fonts"
          [ -d "resources" ] && cp -r "resources" "$APP/Resources/resources"

          # Generate .icns from icon.png (lives in the source tree, not build dir)
          ICON_SRC="resources/icon.png"
          if [ -f "$ICON_SRC" ]; then
            ICONSET="$APP/Resources/KyroSpades.iconset"
            mkdir -p "$ICONSET"
            for sz in 16 32 128 256 512; do
              sips -z $sz $sz "$ICON_SRC" --out "$ICONSET/icon_${sz}x${sz}.png" >/dev/null
              d=$((sz * 2))
              sips -z $d $d "$ICON_SRC" --out "$ICONSET/icon_${sz}x${sz}@2x.png" >/dev/null
            done
            iconutil -c icns "$ICONSET" -o "$APP/Resources/KyroSpades.icns"
            rm -rf "$ICONSET"
          fi
          # Copy source-tree resources not present in the build dir
          [ -f "resources/config.ini" ] && cp "resources/config.ini" "$APP/Resources/"

          cat > "$APP/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>KyroSpades</string>
            <key>CFBundleIdentifier</key><string>com.kyrope01.kyrospades</string>
            <key>CFBundleName</key><string>KyroSpades</string>
            <key>CFBundleIconFile</key><string>KyroSpades</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Rewrite executable refs: @loader_path/lib/ → @loader_path/../Frameworks/
          for dep in $(otool -L "$APP/MacOS/KyroSpades" | tail -n +2 | awk '{print $1}'); do
            case "$dep" in
              @loader_path/lib/*)
                dylib=$(basename "$dep")
                install_name_tool -change "$dep" "@loader_path/../Frameworks/$dylib" "$APP/MacOS/KyroSpades"
                ;;
            esac
          done
          # Dylib sibling refs already use @loader_path/ (same dir = Frameworks/).
          # Sign the whole bundle — one Gatekeeper prompt.
          codesign --force --deep --sign - --timestamp=none "KyroSpades.app"

      - name: Verify macOS binary arch + min OS (macOS)
        if: matrix.platform == 'macos'
        run: |
          BIN=build/KyroSpades.app/Contents/MacOS/KyroSpades
          file "$BIN"
          lipo -archs "$BIN" || true
          otool -l "$BIN" | grep -A4 -E 'LC_VERSION_MIN_MACOSX|LC_BUILD_VERSION' || true

      - name: Zip release (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd build
          zip -9r "KyroSpades MacOS.zip" KyroSpades.app/

      # --- UPLOAD ARTIFACTS ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: build/*.zip

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Sync upstream KyroSpades
        run: |
          cp -r src /tmp/ks-backup-src
          cp -r cmake /tmp/ks-backup-cmake
          cp -r .github /tmp/ks-backup-github
          cp -r deps /tmp/ks-backup-deps
          cp CMakeLists.txt /tmp/ks-backup-cmakelists 2>/dev/null || true
          cp README.md /tmp/ks-backup-readme 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Kyrope01/KyroSpades.git || true
          git fetch upstream
          if ! git merge upstream/main --no-edit; then
            echo "::warning::Upstream merge failed (diverged history / conflicts) — building WITHOUT latest upstream changes."
            git merge --abort || true
          fi
          rm -rf src && mv /tmp/ks-backup-src src
          rm -rf cmake && mv /tmp/ks-backup-cmake cmake
          rm -rf .github && mv /tmp/ks-backup-github .github
          rm -rf deps && mv /tmp/ks-backup-deps deps
          mv /tmp/ks-backup-cmakelists CMakeLists.txt 2>/dev/null || true
          mv /tmp/ks-backup-readme README.md 2>/dev/null || true
        shell: bash

      - name: Ensure Android asset script exists
        run: |
          if [[ ! -f package_android_assets.sh ]]; then
            echo "package_android_assets.sh missing after upstream merge — creating inline"
            cat > package_android_assets.sh << 'ASSETS_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          KS_DIR="${1:-$SCRIPT_DIR}"
          ASSETS="$KS_DIR/android/app/src/main/assets"
          [[ -d "$KS_DIR/resources" ]] || { echo "::error::resources/ directory not found"; exit 1; }
          if [[ ! -f "$KS_DIR/bsresources.zip" ]]; then
            echo "bsresources.zip not found — downloading ..."
            curl -L --fail -o "$KS_DIR/bsresources.zip" http://aos.party/bsresources.zip
          fi
          rm -rf "$ASSETS"
          mkdir -p "$ASSETS"
          echo "[1/3] Copying resources/ ..."
          cp -R "$KS_DIR/resources/." "$ASSETS/"
          rm -f "$ASSETS/icon.rc"
          echo "[2/3] Extracting bsresources.zip ..."
          unzip -o -q "$KS_DIR/bsresources.zip" -d "$ASSETS"
          find "$ASSETS" -name '.gitignore' -delete
          if [[ -d "$KS_DIR/resources.override" ]]; then
            echo "[3/3] Applying resources.override/ ..."
            cp -R "$KS_DIR/resources.override/." "$ASSETS/"
          else
            echo "[3/3] No resources.override/ — skipping"
          fi
          echo "Done. config.ini: $( [[ -f "$ASSETS/config.ini" ]] && echo present || echo MISSING )"
          ASSETS_EOF
            chmod +x package_android_assets.sh
          fi
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK + CMake
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Cache Android native deps
        uses: actions/cache@v4
        with:
          path: build-android/deps-install
          key: android-arm64-api21-enet1.3.18-libdeflate1.20-openal1.23.1

      - name: Build native deps (enet + libdeflate)
        run: |
          set -euo pipefail
          NDK="$ANDROID_HOME/ndk/27.2.12479018"
          DEPS="$GITHUB_WORKSPACE/build-android/deps-install"
          mkdir -p "$DEPS/lib" "$DEPS/include"
          COMMON="-DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
                  -DANDROID_ABI=arm64-v8a \
                  -DANDROID_PLATFORM=android-21 \
                  -DANDROID_STL=c++_static \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_INSTALL_PREFIX=$DEPS \
                  -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

          # enet (static)
          if [ ! -f "$DEPS/lib/libenet.a" ]; then
            curl -L -o enet.tar.gz https://github.com/lsalzman/enet/archive/refs/tags/v1.3.18.tar.gz
            tar xzf enet.tar.gz
            cmake -S enet-1.3.18 -B enet-build $COMMON
            cmake --build enet-build --parallel
            find enet-build -name 'libenet.a' -exec cp {} "$DEPS/lib/" \;
            cp -r enet-1.3.18/include/enet "$DEPS/include/"
          fi

          # libdeflate (static)
          if [ ! -f "$DEPS/lib/libdeflate.a" ]; then
            curl -L -o libdeflate.tar.gz https://github.com/ebiggers/libdeflate/archive/refs/tags/v1.20.tar.gz
            tar xzf libdeflate.tar.gz
            cmake -S libdeflate-1.20 -B libdeflate-build $COMMON \
                  -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
                  -DLIBDEFLATE_BUILD_STATIC_LIB=ON \
                  -DLIBDEFLATE_BUILD_GZIP=OFF \
                  -DLIBDEFLATE_BUILD_TESTS=OFF
            cmake --build libdeflate-build --parallel
            cmake --install libdeflate-build
          fi

          # openal-soft (static, OpenSL ES backend) — sound support
          if [ ! -f "$DEPS/lib/libopenal.a" ]; then
            curl -L -o openal.tar.gz https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz
            tar xzf openal.tar.gz
            cmake -S openal-soft-1.23.1 -B openal-build $COMMON \
                  -DLIBTYPE=STATIC \
                  -DALSOFT_EXAMPLES=OFF \
                  -DALSOFT_TESTS=OFF \
                  -DALSOFT_UTILS=OFF \
                  -DALSOFT_BACKEND_OPENSL=ON \
                  -DALSOFT_BACKEND_OBOE=OFF
            cmake --build openal-build --parallel
            cmake --install openal-build
          fi

      - name: Package game assets into the APK project
        run: |
          chmod +x package_android_assets.sh
          ./package_android_assets.sh

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Restore release keystore (optional)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "KS_RELEASE_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore restored from secrets."
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret set."
            echo "The release APK will be signed with the debug key (still installable on phones)."
          fi

      - name: Build APK (assembleRelease)
        env:
          KS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KS_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p build
          cp android/app/build/outputs/apk/release/*.apk "build/KyroSpades Android.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/*.apk


  build-ios:
    name: Build for iOS
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (iPhoneOS SDK)
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install ninja
        run: brew install ninja || true

      - name: Cache iOS native deps
        uses: actions/cache@v4
        with:
          path: |
            build-ios/prefix
            build-ios/deps-src
            build-ios/SDL
            build-ios/openal-soft
            build-ios/enet
            build-ios/libdeflate
          key: ios-arm64-sdl2.30.10-openal1.23.1-enet1.3.18-libdeflate1.20

      - name: Build unsigned .app
        run: |
          chmod +x build_ios.sh
          ./build_ios.sh

      - name: Package unsigned .ipa
        run: |
          set -euo pipefail
          rm -rf Payload
          mkdir Payload
          cp -R "build-ios/KyroSpades.app" Payload/
          mkdir -p build
          # An .ipa is just a zip with the app inside Payload/. It is UNSIGNED:
          # install it via AltStore/Sideloadly/TrollStore or re-sign with your
          # own certificate — it will not install straight from Safari.
          zip -9qry "build/KyroSpades iOS (unsigned).ipa" Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/*.ipa


  release:
    name: Create GitHub Release
    needs: [build, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true
          path: release-artifacts

      - name: Get date for release tag
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          name: Latest Win Mac Linux, Android & iOS Build
          files: |
            release-artifacts/KyroSpades-win64.zip
            release-artifacts/KyroSpades Linux.zip
            release-artifacts/KyroSpades MacOS.zip
            release-artifacts/KyroSpades Android.apk
            release-artifacts/KyroSpades iOS (unsigned).ipa
          body: Latest version of the game compiled for Windows, Linux, Android, macOS and iOS. The iOS .ipa is UNSIGNED — sideload it with AltStore/Sideloadly (free Apple ID works) or re-sign it with your own certificate.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
